var markers = [], polylines = [];
const emojis = { food: '🍽️', spot: '📍', hotel: '🏨', transport: '🚃', drink: '🍺' };

function clearMap() { markers.forEach(function(m) { map.removeLayer(m); }); polylines.forEach(function(p) { map.removeLayer(p); }); markers = []; polylines = []; }

function showDay(idx) {
  clearMap();
  if (idx === 0) {
    var pts = [];
    DAYS.forEach(function(d) { d.locations.forEach(function(l) { if(l.lat) pts.push([l.lat, l.lng]); }); });
    if (pts.length) map.fitBounds(pts, { padding: [30,30] });
    DAYS.slice(1).forEach(function(d) {
      d.locations.filter(function(l) { return l.time !== '—'; }).forEach(function(l) {
        var m = L.circleMarker([l.lat, l.lng], { radius: 4, fillColor: d.color, color: '#fff', weight: 1.5, fillOpacity: .9 }).addTo(map)
          .bindPopup('<b>' + l.name + '</b><br><span style="color:#86868b">' + d.label + '</span>');
        markers.push(m);
      });
    });
    return;
  }
  var day = DAYS.find(function(d) { return d.id === idx; });
  if (!day) return;
  var coords = [];
  day.locations.forEach(function(l) {
    if (!l.lat) return;
    var m = L.marker([l.lat, l.lng], { icon: icon(day.color, emojis[l.type] || '📌') }).addTo(map);
    var gQ = l.gmap || encodeURIComponent(l.name + ' China');
    var popupHtml = '<b>' + l.name + '</b>';
    if (l.time !== '—') popupHtml += '<br><span style="color:#86868b">' + l.time + '</span>';
    popupHtml += '<br>' + l.desc;
    if (l.budget) popupHtml += '<br><span style="color:#ff9500">' + l.budget + '</span>';
    popupHtml += '<br><a href="#" onclick="event.preventDefault();openAS(\'' + l.name.replace(/'/g, "\\'") + '\',' + l.lat + ',' + l.lng + ',\'' + gQ + '\')">📍 导航</a>';
    m.bindPopup(popupHtml);
    markers.push(m);
    if (l.time !== '—') coords.push([l.lat, l.lng]);
  });
  if (coords.length > 1) {
    var pl = L.polyline(coords, { color: day.color, weight: 2.5, opacity: .5, dashArray: '6,5' }).addTo(map);
    polylines.push(pl);
  }
  if (coords.length) map.fitBounds(coords, { padding: [40,40], maxZoom: 14 });
}

  }
  if (loc.reserve) lnk += '<a href="' + loc.reserve + '" target="_blank" class="btn rsv">📅 预约</a>';
  var html = '<div class="tl-item"><div class="tl-dot ' + dot + '"></div><div class="card" onclick="if(!event.target.closest(\'.btn,.links\'))toggle(\'' + uid + '\')"><div class="time">' + (loc.time !== '—' ? loc.time : '备选') + '</div><div class="name">' + bdg + ' ' + loc.name + '</div><div class="desc">' + loc.desc + '</div>';
  if (loc.budget) html += '<div class="budget">' + loc.budget + '</div>';
  html += payChips(loc.pay) + '<div class="links">' + lnk + '</div>';
  if (loc.detail) html += '<div class="details" id="' + uid + '">' + loc.detail.replace(/\n/g, '<br>') + '</div>';
  html += '</div></div>';
  return html;
}

function renderDay(idx) {
  var d = DAYS.find(function(x) { return x.id === idx; });
  if (!d) return '';
  var main = d.locations.filter(function(l) { return l.time !== '—'; });
  var alt = d.locations.filter(function(l) { return l.time === '—'; });
  var h = '<div class="day-head"><h2>' + d.title + '</h2><p>' + d.date + '</p></div>';
  if (main.length) {
    h += '<div class="section-head">行程</div><div class="timeline">';
    main.forEach(function(l) { h += locCard(l, idx); });
    h += '</div>';
  }
  if (alt.length) {
    h += '<div class="section-head">备选</div><div class="timeline">';
    alt.forEach(function(l) { h += locCard(l, idx); });
    h += '</div>';
  }
  return h;
}

var cur = 0;
var tabsEl = document.getElementById('tabs');
var contentEl = document.getElementById('content');

DAYS.forEach(function(d) {
  var btn = document.createElement('button');
  btn.className = 'tab' + (d.id === 0 ? ' active' : '');
  btn.dataset.day = d.id;
  btn.textContent = d.label;
  tabsEl.appendChild(btn);
});

function go(idx) {
  cur = idx;
  tabsEl.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', +t.dataset.day === idx); });
  contentEl.innerHTML = idx === 0 ? overviewContent() : renderDay(idx);
  showDay(idx);
  contentEl.scrollTo({ top: 0 });
  var tab = tabsEl.querySelector('[data-day="' + idx + '"]');
  if (tab) tab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

function toggle(id) { var el = document.getElementById(id); if (el) el.classList.toggle('closed'); }

tabsEl.addEventListener('click', function(e) { var t = e.target.closest('.tab'); if (t) go(+t.dataset.day); });

go(0);

var asOverlay = document.createElement('div');
asOverlay.className = 'as-overlay';
asOverlay.innerHTML = '<div class="as-sheet"><div class="as-group" id="as-opts"></div><div class="as-group"><button class="as-item as-cancel" onclick="closeAS()">取消</button></div></div>';
document.body.appendChild(asOverlay);
asOverlay.addEventListener('click', function(e) { if (e.target === asOverlay) closeAS(); });

var IS_IOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
function amapAppUrl(name, lat, lng) {
  var scheme = IS_IOS ? 'iosamap' : 'androidamap';
  return scheme + '://viewMap?sourceApplication=trip&poiname=' + encodeURIComponent(name) + '&lat=' + lat + '&lon=' + lng + '&dev=0';
}
function amapWebUrl(name, lat, lng) {
  return 'https://uri.amap.com/marker?position=' + lng + ',' + lat + '&name=' + encodeURIComponent(name) + '&src=trip&coordinate=wgs84&callnative=1';
}
function openAmap(name, lat, lng) {
  if (IN_APP_WEBVIEW) { window.open(amapWebUrl(name, lat, lng)); return; }
  window.location.href = amapAppUrl(name, lat, lng);
}

function openAS(name, lat, lng, gmap) {
  var q = gmap || encodeURIComponent(name + ' China');
  var encName = encodeURIComponent(name);
  var safeName = name.replace(/'/g, "\\'");
  var appleUrl = IN_APP_WEBVIEW ? 'https://maps.apple.com/?q=' + lat + ',' + lng + '&ll=' + lat + ',' + lng + '&name=' + encName : 'maps://maps.apple.com/?q=' + lat + ',' + lng + '&name=' + encName;
  var googleUrl = 'https://www.google.com/maps/search/?api=1&query=' + q;
  document.getElementById('as-opts').innerHTML =
    '<button class="as-item" onclick="window.open(\'' + appleUrl + '\');closeAS()">🍎 Apple Maps</button>' +
    '<button class="as-item" onclick="window.open(\'' + googleUrl + '\');closeAS()">🗺️ Google Maps</button>' +
    '<button class="as-item" onclick="openAmap(\'' + safeName + '\',' + lat + ',' + lng + ');closeAS()">🧭 高德地图 App</button>';
  asOverlay.classList.add('show');
}
function closeAS() { asOverlay.classList.remove('show'); }
</script>
</body>
</html>
