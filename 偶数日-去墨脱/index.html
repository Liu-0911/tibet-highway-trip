<title>滇藏线 · 香格里拉出发</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

.cards { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
.card { background: #fff; border-radius: 14px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06); text-decoration: none; color: inherit; }

.card p { font-size: 13px; color: #86868b; margin-top: 3px; }

<body>
<h1>🚗 滇藏线 · 香格里拉出发</h1>
<p class="sub">偶数日出发 · 两种方案</p>
<div class="cards">
  <a class="card" href="方案A/index.html">
    <h2>方案A：🚄高铁到香格里拉 <span class="badge blue">推荐</span></h2>
    <p>飞丽江→火车到香格里拉(D1无车省钱)→D2取车→纳帕海→D3虎跳峡一日游→回住香格里拉3晚适应海拔</p>
  </a>
  <a class="card" href="方案B/index.html">

  </a>
