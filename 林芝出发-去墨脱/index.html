var map = L.map('map', { center: [HOTEL.lat, HOTEL.lng], zoom: 6, zoomControl: false, attributionControl: true });
L.control.zoom({ position: 'topright' }).addTo(map);
var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' });
var topo = L.tileLayer('https://tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17, attribution: '© OpenTopoMap' });
osm.addTo(map);
var layers = { '标准地图': osm, '地形图(海拔)': topo };
L.control.layers(null, layers, { position: 'topright' }).addTo(map);

var LocateControl = L.Control.extend({
  options: { position: 'bottomright' },
  onAdd: function() {
    var btn = L.DomUtil.create('button', 'locate-btn');
    btn.innerHTML = '📍'; btn.title = '我的位置';
    L.DomEvent.disableClickPropagation(btn);
    btn.addEventListener('click', function() { btn.classList.add('active'); map.locate({ setView: true, maxZoom: 15 }); });
    this._btn = btn; return btn;
  }
});
new LocateControl().addTo(map);
var locMarker, locCircle;
map.on('locationfound', function(e) {
  var r = e.accuracy / 2;
  if (locMarker) { locMarker.setLatLng(e.latlng); locCircle.setLatLng(e.latlng).setRadius(r); }
  else {
    locMarker = L.marker(e.latlng, { icon: L.divIcon({ className: '', html: '<div style="width:14px;height:14px;border-radius:50%;background:#007aff;border:2.5px solid #fff;box-shadow:0 0 6px rgba(0,122,255,.5)"></div><div class="loc-pulse" style="position:absolute;top:0;left:0"></div>', iconSize: [14,14], iconAnchor: [7,7] }), zIndexOffset: 2000 }).addTo(map);
    locCircle = L.circle(e.latlng, { radius: r, color: '#007aff', fillColor: '#007aff', fillOpacity: .08, weight: 1 }).addTo(map);
  }
});
map.on('locationerror', function() {});

function icon(c, e) { return L.divIcon({ className: '', html: '<div style="width:28px;height:28px;border-radius:50%;background:' + c + ';border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,.18)">' + (e||'') + '</div>', iconSize: [28,28], iconAnchor: [14,14], popupAnchor: [0,-16] }); }
if (HOTEL.lat) L.marker([HOTEL.lat, HOTEL.lng], { icon: icon('#ff9500','🏨'), zIndexOffset: 1000 }).addTo(map).bindPopup('<b>' + HOTEL.name + '</b>');
var markers = [], polylines = [];
var emojis = { food:'🍽️', spot:'📍', hotel:'🏨', transport:'🚃', drink:'🍺' };
function clearMap() { markers.forEach(function(m) { map.removeLayer(m); }); polylines.forEach(function(p) { map.removeLayer(p); }); markers = []; polylines = []; }
function showDay(idx) {
  clearMap();
  if (idx === 0) {
    var pts = []; DAYS.forEach(function(d) { d.locations.forEach(function(l) { if(l.lat) pts.push([l.lat, l.lng]); }); });
    if (pts.length) map.fitBounds(pts, { padding: [30,30] });
    DAYS.slice(1).forEach(function(d) { d.locations.filter(function(l) { return l.time !== '—'; }).forEach(function(l) { var m = L.circleMarker([l.lat, l.lng], { radius: 4, fillColor: d.color, color: '#fff', weight: 1.5, fillOpacity: .9 }).addTo(map).bindPopup('<b>' + l.name + '</b><br><span style="color:#86868b">' + d.label + '</span>'); markers.push(m); }); });
    return;
  }
  var day = DAYS.find(function(d) { return d.id === idx; }); if (!day) return;
  var coords = [];
  day.locations.forEach(function(l) {
    if (!l.lat) return;
    var m = L.marker([l.lat, l.lng], { icon: icon(day.color, emojis[l.type]||'📌') }).addTo(map);
    var gQ = l.gmap || encodeURIComponent(l.name + ' China');
    var pop = '<b>' + l.name + '</b>'; if (l.time !== '—') pop += '<br><span style="color:#86868b">' + l.time + '</span>'; pop += '<br>' + l.desc; pop += '<br><a href="#" onclick="event.preventDefault();openAS(\'' + l.name.replace(/'/g,"\\'") + '\',' + l.lat + ',' + l.lng + ',\'' + gQ + '\')">导航</a>';
    m.bindPopup(pop); markers.push(m); if (l.time !== '—') coords.push([l.lat, l.lng]);
  });
  if (coords.length > 1) { var pl = L.polyline(coords, { color: day.color, weight: 2.5, opacity: .5, dashArray: '6,5' }).addTo(map); polylines.push(pl); }
  if (coords.length) map.fitBounds(coords, { padding: [40,40], maxZoom: 14 });
}
function payChips(pay) { if (!pay) return ''; var h = '<div class="pays">'; var m = { cash:'💴', card:'💳', alipay:'支付宝', wechat:'微信' }; for (var k in m) { if (pay[k] !== undefined) { var c = pay[k] === 1 ? 'ok' : (pay[k] === 0.5 ? 'idk' : 'no'); h += '<span class="pay ' + c + '">' + m[k] + '</span>'; } } return h + '</div>'; }
var IN_APP_WEBVIEW = (function() { var ua = (navigator.userAgent||'').toLowerCase(); return /micromessenger|xhs|xhsdiscover|discover\/|tiktok|aweme|weibo|qq\/|qqbrowser|alipayclient|dingtalk|lark|feishu|ucbrowser|baiduboxapp|toutiao|newsarticle/.test(ua); })();
function xhsKeyword(loc) { if (loc.xhsKeyword) return loc.xhsKeyword.trim(); return (loc.name||'').replace(/[📍★⭐✅]*$/g,'').replace(/[（(].*?[）)]/g,'').replace(/\s+/g,' ').trim(); }
function xhsAppUrl(loc) { return 'xhsdiscover://search/result?keyword=' + encodeURIComponent(xhsKeyword(loc)) + '&target_search=notes&source=deeplink'; }
function xhsWebUrl(loc) { return 'https://www.xiaohongshu.com/search_result?keyword=' + encodeURIComponent(xhsKeyword(loc)) + '&source=web_explore_feed'; }
function dpKeyword(loc) { if (loc.dianpingKeyword) return loc.dianpingKeyword.trim(); return (loc.name||'').replace(/[📍★⭐✅]*$/g,'').replace(/[（(].*?[）)]/g,'').replace(/\s+/g,' ').trim(); }
function dpAppUrl(loc) { return 'dianping://searchshoplist?keyword=' + encodeURIComponent(dpKeyword(loc)); }
function dpWebUrl(loc) { return 'https://m.dianping.com/searchshop?keyword=' + encodeURIComponent(dpKeyword(loc)); }
window._extLocs = {}; DAYS.forEach(function(d) { d.locations.forEach(function(l) { window._extLocs[d.id+'::'+l.name] = l; }); }); window._xhsLocs = window._extLocs;
function openExt(key, kind) { var loc = window._extLocs[key]; if (!loc) return false; if (IN_APP_WEBVIEW) { window.location.href = kind === 'dp' ? dpWebUrl(loc) : xhsWebUrl(loc); } else { window.location.href = kind === 'dp' ? dpAppUrl(loc) : xhsAppUrl(loc); } return false; }
function openXhs(key) { return openExt(key, 'xhs'); } function openDp(key) { return openExt(key, 'dp'); }
function locCard(loc, dayIdx) {
  var dot = loc.type==='food'?'food':loc.type==='spot'?'spot':loc.type==='drink'?'drink':loc.type==='hotel'?'hotel':'transport';
  var bdg = loc.type==='food'?'<span class="badge food">餐</span>':loc.type==='spot'?'<span class="badge spot">景</span>':loc.type==='drink'?'<span class="badge drink">饮</span>':'';
  var uid = 'd'+dayIdx+'-'+loc.name.replace(/\W/g,''); var locKey = dayIdx+'::'+loc.name;
  var gQ = loc.gmap||encodeURIComponent(loc.name+' China');
  var lnk = '<button class="btn nav" onclick="openAS(\''+loc.name.replace(/'/g,"\\'")+'\','+loc.lat+','+loc.lng+',\''+gQ+'\')">导航</button>';
  if (loc.xhs||loc.xhsKeyword) { var xH = IN_APP_WEBVIEW ? xhsWebUrl(loc) : xhsAppUrl(loc); lnk += '<a href="'+xH+'" onclick="return openXhs(\''+locKey.replace(/'/g,"\\'")+'\')" class="btn xhs">小红书</a>'; }
  if (loc.dianping!==false&&(loc.dianping||loc.dianpingKeyword||loc.type==='food'||loc.type==='drink')) { var dH = IN_APP_WEBVIEW ? dpWebUrl(loc) : dpAppUrl(loc); lnk += '<a href="'+dH+'" onclick="return openDp(\''+locKey.replace(/'/g,"\\'")+'\')" class="btn dp">大众点评</a>'; }
  if (loc.reserve) lnk += '<a href="'+loc.reserve+'" target="_blank" class="btn rsv">预约</a>';
  var r = '<div class="tl-item"><div class="tl-dot '+dot+'"></div><div class="card" onclick="if(!event.target.closest(\'.btn,.links\'))toggle(\''+uid+'\')"><div class="time">'+(loc.time!=='—'?loc.time:'备选')+'</div><div class="name">'+bdg+' '+loc.name+'</div><div class="desc">'+loc.desc+'</div>';
  if (loc.budget) r += '<div class="budget">'+loc.budget+'</div>'; r += payChips(loc.pay)+'<div class="links">'+lnk+'</div>'; if (loc.detail) r += '<div class="details" id="'+uid+'">'+loc.detail.replace(/\n/g,'<br>')+'</div>'; r += '</div></div>'; return r;
}
function renderDay(idx) { var d = DAYS.find(function(x){return x.id===idx;}); if(!d) return ''; var main = d.locations.filter(function(l){return l.time!=='—';}); var alt = d.locations.filter(function(l){return l.time==='—';}); var h = '<div class="day-head"><h2>'+d.title+'</h2><p>'+d.date+'</p></div>'; if(main.length) { h += '<div class="section-head">行程</div><div class="timeline">'; main.forEach(function(l){h+=locCard(l,idx);}); h+='</div>'; } if(alt.length) { h+='<div class="section-head">备选</div><div class="timeline">'; alt.forEach(function(l){h+=locCard(l,idx);}); h+='</div>'; } return h; }
var cur=0, tabsEl=document.getElementById('tabs'), contentEl=document.getElementById('content');
DAYS.forEach(function(d){var btn=document.createElement('button');btn.className='tab'+(d.id===0?' active':'');btn.dataset.day=d.id;btn.textContent=d.label;tabsEl.appendChild(btn);});
function go(idx) { cur=idx; tabsEl.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',+t.dataset.day===idx);}); contentEl.innerHTML=idx===0?overviewContent():renderDay(idx); showDay(idx); contentEl.scrollTo({top:0}); var tab=tabsEl.querySelector('[data-day="'+idx+'"]'); if(tab) tab.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'}); }
function toggle(id){var el=document.getElementById(id);if(el)el.classList.toggle('closed');}
tabsEl.addEventListener('click',function(e){var t=e.target.closest('.tab');if(t)go(+t.dataset.day);});
go(0);
var asOverlay=document.createElement('div');asOverlay.className='as-overlay';asOverlay.innerHTML='<div class="as-sheet"><div class="as-group" id="as-opts"></div><div class="as-group"><button class="as-item as-cancel" onclick="closeAS()">取消</button></div></div>';document.body.appendChild(asOverlay);asOverlay.addEventListener('click',function(e){if(e.target===asOverlay)closeAS();});
var IS_IOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
function amapAppUrl(name,lat,lng){var scheme=IS_IOS?'iosamap':'androidamap';return scheme+'://viewMap?sourceApplication=trip&poiname='+encodeURIComponent(name)+'&lat='+lat+'&lon='+lng+'&dev=0';}
function amapWebUrl(name,lat,lng){return 'https://uri.amap.com/marker?position='+lng+','+lat+'&name='+encodeURIComponent(name)+'&src=trip&coordinate=wgs84&callnative=1';}
function openAmap(name,lat,lng){if(IN_APP_WEBVIEW){window.open(amapWebUrl(name,lat,lng));return;}window.location.href=amapAppUrl(name,lat,lng);}
function openAS(name,lat,lng,gmap){var q=gmap||encodeURIComponent(name+' China');var encName=encodeURIComponent(name);var safeName=name.replace(/'/g,"\\'");var appleUrl=IN_APP_WEBVIEW?'https://maps.apple.com/?q='+lat+','+lng+'&ll='+lat+','+lng+'&name='+encName:'maps://maps.apple.com/?q='+lat+','+lng+'&name='+encName;var googleUrl='https://www.google.com/maps/search/?api=1&query='+q;document.getElementById('as-opts').innerHTML='<button class="as-item" onclick="window.open(\''+appleUrl+'\');closeAS()">Apple Maps</button><button class="as-item" onclick="window.open(\''+googleUrl+'\');closeAS()">Google Maps</button><button class="as-item" onclick="openAmap(\''+safeName+'\','+lat+','+lng+');closeAS()">高德地图</button>';asOverlay.classList.add('show');}
function closeAS(){asOverlay.classList.remove('show');}
