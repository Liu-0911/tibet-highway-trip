<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>滇藏线自驾攻略</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.025em; }
.sub { font-size: 16px; color: #86868b; margin-bottom: 30px; }
.cards { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 400px; }
.card { background: #fff; border-radius: 16px; padding: 20px 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); text-decoration: none; color: inherit; transition: box-shadow .25s; }
.card:active { box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.card h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.card p { font-size: 14px; color: #86868b; }
.badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
.badge.green { background: rgba(52,199,89,.1); color: #34c759; }
.badge.blue { background: rgba(0,122,255,.1); color: #007aff; }
.badge.purple { background: rgba(175,82,222,.1); color: #af52de; }
.footer { margin-top: 30px; font-size: 12px; color: #aeaeb2; text-align: center; }
</style>
</head>
<body>
<h1>🚗 滇藏线自驾攻略</h1>
<p class="sub">G214/G318 · 丽江/林芝出发 · 多种方案</p>
<div class="cards">
  <a class="card" href="林芝出发-去墨脱/index.html">
    <h2>✈️ 林芝出发 · 反穿滇藏线 <span class="badge purple">推荐</span></h2>
    <p>飞林芝→拉萨(羊湖+纳木错)→反穿→墨脱→虎跳峡→丽江还车 · 11天</p>
  </a>
  <a class="card" href="偶数日-去墨脱/index.html">
    <h2>🚄 香格里拉出发 · 含墨脱 <span class="badge green">经典</span></h2>
    <p>飞丽江→高铁香格里拉→滇藏线→墨脱→拉萨 · 12天</p>
  </a>
  <a class="card" href="偶数日-不去墨脱/index.html">
    <h2>🚄 香格里拉出发 · 经典版 <span class="badge blue">精简</span></h2>
    <p>飞丽江→高铁香格里拉→滇藏线→拉萨(纳木错) · 10天</p>
  </a>
</div>
<p class="footer">🗺️ 点击攻略查看每日行程 · 支持 Apple Maps/Google Maps/高德导航</p>
</body>
</html>
